<!DOCTYPE html>
<html>
<body>
    <h1>TV Monitoring Dashboard</h1>
    <div id="status">Checking TV Status...</div>
    <script>
        fetch('/api/status')
            .then(res => res.json())
            .then(data => {
                document.getElementById('status').innerText = "Status: " + data.status;
            });
    </script>
</body>
</html>
